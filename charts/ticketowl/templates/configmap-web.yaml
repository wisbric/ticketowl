{{- if .Values.web.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ticketowl.fullname" . }}-web
  labels:
    {{- include "ticketowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # SPA routing — all non-file requests go to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy — resolve at runtime to avoid startup DNS failures
        resolver kube-dns.kube-system.svc.cluster.local valid=10s;
        set $api_upstream {{ include "ticketowl.fullname" . }}:{{ .Values.service.port }};

        location /api/ {
            proxy_pass http://$api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/ {
            proxy_pass http://$api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
{{- end }}
