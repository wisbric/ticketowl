{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ticketowl.fullname" . }}-web
  labels:
    {{- include "ticketowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ticketowl.webSelectorLabels" . | nindent 4 }}
{{- end }}
