apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ticketowl.fullname" . }}
  labels:
    {{- include "ticketowl.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  APP_PORT: {{ .Values.config.port | quote }}
  MIGRATIONS_GLOBAL_DIR: "/migrations/global"
  MIGRATIONS_TENANT_DIR: "/migrations/tenant"
  TICKETOWL_WORKER_POLL_SECONDS: {{ .Values.config.workerPollSeconds | quote }}
  {{- if .Values.config.nightowlApiUrl }}
  TICKETOWL_NIGHTOWL_API_URL: {{ .Values.config.nightowlApiUrl | quote }}
  {{- end }}
  {{- if .Values.config.bookowlApiUrl }}
  TICKETOWL_BOOKOWL_API_URL: {{ .Values.config.bookowlApiUrl | quote }}
  {{- end }}
  {{- if .Values.config.nightowlUrl }}
  TICKETOWL_NIGHTOWL_URL: {{ .Values.config.nightowlUrl | quote }}
  {{- end }}
  {{- if .Values.config.bookowlUrl }}
  TICKETOWL_BOOKOWL_URL: {{ .Values.config.bookowlUrl | quote }}
  {{- end }}
  {{- if .Values.config.otelEndpoint }}
  TICKETOWL_OTEL_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
  {{- end }}
