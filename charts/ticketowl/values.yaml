# TicketOwl Helm Chart Values

image:
  repository: ghcr.io/wisbric/ticketowl
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- API server configuration
api:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

# -- Worker configuration (single replica — no leader election in v1)
worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Frontend (nginx + React SPA)
web:
  enabled: false
  image:
    repository: ghcr.io/wisbric/ticketowl-web
    pullPolicy: IfNotPresent
    tag: ""  # defaults to Chart.AppVersion
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- Extra volumes to mount (e.g. CA certificates)
extraVolumes: []
extraVolumeMounts: []

# -- Application configuration (non-secret env vars)
config:
  logLevel: info
  logFormat: json
  port: "8082"
  workerPollSeconds: "60"
  nightowlApiUrl: ""
  bookowlApiUrl: ""
  otelEndpoint: ""

# -- Secrets (create Secret resource or reference existing)
secrets:
  create: true
  # -- Name of existing secret to use (if create is false)
  existingSecret: ""
  dbUrl: ""
  redisUrl: ""
  oidcIssuer: ""
  oidcClientId: ""
  oidcClientSecret: ""
  oidcRedirectUrl: ""   # e.g. https://ticketowl.example.com/auth/oidc/callback
  encryptionKey: ""
  adminPassword: ""
  nightowlApiKey: ""
  bookowlApiKey: ""

# -- Service
service:
  type: ClusterIP
  port: 8082

# -- Ingress
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # certmanager.step.sm/cluster-issuer: step-cluster-issuer
  hosts:
    - host: ticketowl.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: ticketowl-tls
    #   hosts:
    #     - ticketowl.example.com

# -- Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Seed job (runs on first install to bootstrap tenant + admin)
seed:
  enabled: false

# -- Migration job
migration:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
